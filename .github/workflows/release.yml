name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ''
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev
      # macOS uses built-in WebKit — no extra deps needed
      - run: cargo build --release -p vibege-runtime-app --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vibege-runtime-${{ matrix.target }}${{ matrix.ext }}
          path: target/${{ matrix.target }}/release/vibege-runtime${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { pattern: vibege-runtime-*, merge-multiple: true }
      - name: Generate checksums
        run: sha256sum vibege-runtime-* > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: VibeGE Runtime ${{ github.ref_name }}
          body: |
            ## VibeGE Runtime ${{ github.ref_name }}
            
            See the [changelog](https://github.com/millsydotdev/vibege-runtime/blob/main/CHANGELOG.md) for details.
            
            ### Downloads
            - **Windows** (x64): `vibege-runtime-x86_64-pc-windows-msvc.exe`
            - **macOS** (x64): `vibege-runtime-x86_64-apple-darwin`
            - **Linux** (x64): `vibege-runtime-x86_64-unknown-linux-gnu`
          files: |
            vibege-runtime-*
            checksums.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
