<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VibeGE</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none}
:root{--bg:#0a0a0f;--card:#1a1a2e;--card-hover:#252545;--accent:#7c3aed;--accent-dim:#581c87;--text:#e4e4e7;--text-dim:#71717a;--radius:16px;--icon-size:64px}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;height:100vh;width:100vw}
/* Status bar */
.status{display:flex;justify-content:space-between;padding:8px 20px 4px;font-size:12px;font-weight:600;color:var(--text-dim)}
/* Screens */
.screen{display:none;flex-direction:column;height:calc(100vh - 28px);padding:0 16px}
.screen.active{display:flex}
/* Home grid */
.icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:12px;padding:8px 0;overflow-y:auto;flex:1;align-content:start}
.icon{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px 6px;border-radius:var(--radius);cursor:pointer;transition:background .15s;border:none;background:none;color:var(--text)}
.icon:hover{background:var(--card-hover)}
.icon:active{transform:scale(0.92)}
.icon .thumb{width:var(--icon-size);height:var(--icon-size);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff}
.icon .name{font-size:11px;text-align:center;line-height:1.2;color:var(--text-dim);max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* Bottom dock */
.dock{display:flex;justify-content:center;gap:6px;padding:10px 0 14px;border-top:1px solid rgba(255,255,255,0.06)}
.dock .icon .thumb{width:48px;height:48px;font-size:20px;border-radius:12px}
/* Settings panel */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:none;backdrop-filter:blur(4px)}
.overlay.open{display:block}
.panel{position:fixed;top:0;right:-360px;width:340px;height:100%;background:var(--card);z-index:101;transition:right .25s ease;overflow-y:auto;padding:0}
.panel.open{right:0}
.panel-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06)}
.panel-header h2{font-size:16px;font-weight:600}
.panel-close{background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;padding:4px}
.panel-body{padding:16px 20px}
.setting-group{margin-bottom:20px}
.setting-label{font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.setting-row label{font-size:13px}
select,input[type=range]{background:var(--bg);color:var(--text);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:6px 10px;font-size:12px}
input[type=range]{padding:0;width:100px;accent-color:var(--accent)}
.shortcut-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:6px 0}
.shortcut-btn{background:var(--bg);border:1px solid rgba(255,255,255,0.1);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--text);cursor:pointer;font-family:inherit}
.shortcut-btn.active{border-color:var(--accent);background:rgba(124,58,237,0.15)}
/* Game detail modal */
.modal{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px)}
.modal-card{position:relative;background:var(--card);border-radius:var(--radius);width:320px;max-height:80vh;overflow-y:auto;padding:24px}
.modal-card h2{font-size:20px;margin-bottom:4px}
.modal-card .sub{color:var(--text-dim);font-size:13px;margin-bottom:12px}
.modal-card p{font-size:13px;color:var(--text-dim);line-height:1.5;margin-bottom:16px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.7}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:rgba(255,255,255,0.08);color:var(--text)}
.btn-danger{background:rgba(239,68,68,0.2);color:#ef4444}
.btn-sm{padding:6px 14px;font-size:11px}
/* Store list */
.store-list{display:flex;flex-direction:column;gap:8px}
.store-item{display:flex;gap:10px;padding:10px;border-radius:12px;background:rgba(255,255,255,0.03);align-items:center}
.store-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;flex-shrink:0}
.store-info{flex:1;min-width:0}
.store-name{font-size:13px;font-weight:600}
.store-meta{font-size:10px;color:var(--text-dim);margin-top:1px}
.store-desc{font-size:11px;color:var(--text-dim);margin-top:2px;line-height:1.3}
.store-tags{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.store-tags .tag{font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(124,58,237,0.15);color:#a78bfa}
.store-action{flex-shrink:0}
.installed-badge{font-size:11px;color:#10b981;font-weight:500}
.btn-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
/* List view */
.list-view{display:flex;flex-direction:column;gap:2px;padding:4px 0;overflow-y:auto;flex:1}
.list-item{display:flex;align-items:center;gap:12px;padding:10px 8px;border-radius:10px;cursor:pointer;transition:background .15s;border:none;background:none;color:var(--text);width:100%;text-align:left}
.list-item:hover{background:var(--card-hover)}
.list-item .thumb{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.list-item .info{flex:1;min-width:0}
.list-item .info .name{font-size:13px;font-weight:500}
.list-item .info .meta{font-size:11px;color:var(--text-dim)}
.list-item .play-btn{font-size:20px;opacity:.6}
/* View toggle */
.view-toggle{display:flex;gap:4px;padding:4px 0 8px}
.view-toggle button{background:none;border:1px solid rgba(255,255,255,0.08);color:var(--text-dim);padding:4px 12px;border-radius:8px;font-size:11px;cursor:pointer;transition:all .15s}
.view-toggle button.active{background:var(--accent-dim);border-color:var(--accent);color:var(--text)}
/* Scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
</style>
</head>
<body>

<div class="status">
  <span id="time">10:09</span>
  <span>VibeGE</span>
</div>

<!-- HOME SCREEN -->
<div id="screen-home" class="screen active">
  <div class="view-toggle">
    <button id="view-grid" class="active" onclick="setView('grid')">Grid</button>
    <button id="view-list" onclick="setView('list')">List</button>
  </div>
  <div id="game-grid" class="icon-grid"></div>
  <div id="game-list" class="list-view" style="display:none"></div>
  <div class="dock">
    <div class="icon" onclick="openPanel('store')">
      <div class="thumb" style="background:linear-gradient(135deg,#7c3aed,#06b6d4)">🏪</div>
      <span class="name">Store</span>
    </div>
    <div class="icon" onclick="openPanel('settings')">
      <div class="thumb" style="background:linear-gradient(135deg,#f59e0b,#ef4444)">⚙️</div>
      <span class="name">Settings</span>
    </div>
    <div class="icon" onclick="apiAbout()">
      <div class="thumb" style="background:linear-gradient(135deg,#10b981,#3b82f6)">ℹ️</div>
      <span class="name">About</span>
    </div>
  </div>
</div>

<!-- OVERLAY + SETTINGS PANEL -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-header">
    <h2 id="panel-title">Settings</h2>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<!-- GAME DETAIL MODAL -->
<div class="modal" id="modal">
  <div class="modal-bg" onclick="closeModal()"></div>
  <div class="modal-card" id="modal-card"></div>
</div>

<script>
// ─── IPC ───
// Uses wry's built-in IPC: window.ipc.postMessage sends a JSON string to Rust.
// Rust responds by calling window.__VIBEGE_RESPONSE__(data).
const _pending = {};
let _reqId = 0;
window.__VIBEGE_RESPONSE__ = function(data) {
  // Route responses to pending requests
  for (const id in _pending) {
    _pending[id](data);
    delete _pending[id];
  }
};
function api(method, path, body) {
  return new Promise((resolve, reject) => {
    const id = ++_reqId;
    _pending[id] = resolve;
    const msg = JSON.stringify({ method, path, data: body, id });
    window.ipc.postMessage(msg);
    // Timeout after 5s
    setTimeout(() => { delete _pending[id]; reject(new Error('timeout')); }, 5000);
  });
}

// ─── Clock ───
function updateClock() {
  const d = new Date();
  document.getElementById('time').textContent = d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock, 10000);
updateClock();

// ─── View toggle ───
function setView(v) {
  document.getElementById('game-grid').style.display = v === 'grid' ? '' : 'none';
  document.getElementById('game-list').style.display = v === 'list' ? '' : 'none';
  document.getElementById('view-grid').className = v === 'grid' ? 'active' : '';
  document.getElementById('view-list').className = v === 'list' ? 'active' : '';
}

// ─── Load game list ───
async function loadGames() {
  try {
    const data = await api('GET', '/list-installed');
    const games = data.games || [];
    renderGrid(games);
    renderList(games);
  } catch(e) {
    document.getElementById('game-grid').innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-dim);font-size:13px">No games installed</div>';
  }
}

const GRADIENTS = [
  'linear-gradient(135deg,#7c3aed,#06b6d4)','linear-gradient(135deg,#10b981,#3b82f6)',
  'linear-gradient(135deg,#f59e0b,#ef4444)','linear-gradient(135deg,#ec4899,#8b5cf6)',
  'linear-gradient(135deg,#14b8a6,#3b82f6)','linear-gradient(135deg,#f97316,#e11d48)'
];

function renderGrid(games) {
  const grid = document.getElementById('game-grid');
  grid.innerHTML = '';
  for (const g of games) {
    const div = document.createElement('div');
    div.className = 'icon';
    div.onclick = () => showGame(g);
    const gd = GRADIENTS[g.name.length % GRADIENTS.length];
    div.innerHTML = `
      <div class="thumb" style="background:${gd}">${g.name.charAt(0).toUpperCase()}</div>
      <span class="name">${esc(g.name)}</span>`;
    grid.appendChild(div);
  }
}

function renderList(games) {
  const list = document.getElementById('game-list');
  list.innerHTML = '';
  for (const g of games) {
    const div = document.createElement('div');
    div.className = 'list-item';
    const gd = GRADIENTS[g.name.length % GRADIENTS.length];
    div.innerHTML = `
      <div class="thumb" style="background:${gd}">${g.name.charAt(0).toUpperCase()}</div>
      <div class="info">
        <div class="name">${esc(g.name)}</div>
        <div class="meta">${g.downloads || 0} downloads · ${g.rating ? '★ '+g.rating.toFixed(1) : ''}</div>
      </div>
      <span class="play-btn" onclick="event.stopPropagation();launchGame('${esc(g.id)}','${esc(g.name)}')">▶</span>`;
    div.onclick = () => showGame(g);
    list.appendChild(div);
  }
}

function esc(s) { return String(s).replace(/[<>&"]/g,c=>'&#'+c.charCodeAt(0)+';') }

// ─── Game modal ───
function showGame(g) {
  const gd = GRADIENTS[g.name.length % GRADIENTS.length];
  document.getElementById('modal-card').innerHTML = `
    <div class="thumb" style="width:64px;height:64px;border-radius:14px;background:${gd};display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;margin-bottom:12px">${g.name.charAt(0).toUpperCase()}</div>
    <h2>${esc(g.name)}</h2>
    <div class="sub">${g.ownerName || 'Unknown'} · ★ ${(g.rating||0).toFixed(1)} · ⬇ ${(g.downloads||0).toLocaleString()}</div>
    <p>${esc(g.description || 'No description')}</p>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="launchGame('${esc(g.id)}','${esc(g.name)}')">▶ Play</button>
      <button class="btn btn-secondary" onclick="closeModal()">Close</button>
    </div>`;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

// ─── Launch game ───
async function launchGame(id, name) {
  try {
    await api('POST', `/launch/${encodeURIComponent(id)}`);
  } catch(e) {
    document.getElementById('modal-card').innerHTML += `<p style="color:#ef4444;font-size:12px;margin-top:8px">Failed: ${e.message}</p>`;
  }
}

// ─── Panels (Settings, Store) ───
async function openPanel(name) {
  const title = document.getElementById('panel-title');
  const body = document.getElementById('panel-body');
  document.getElementById('overlay').classList.add('open');

  if (name === 'settings') {
    title.textContent = 'Settings';
    body.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-dim);font-size:13px">Loading settings...</div>';
    document.getElementById('panel').classList.add('open');
    await loadSettings();
  } else if (name === 'store') {
    title.textContent = 'Game Store';
    body.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-dim);font-size:13px">Loading store...</div>';
    document.getElementById('panel').classList.add('open');
    loadStore();
  }
}

async function loadStore() {
  const body = document.getElementById('panel-body');
  try {
    const data = await api('GET', '/list-store');
    const games = data.games || [];
    if (games.length === 0) {
      body.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim)"><p style="font-size:32px;margin-bottom:12px">🏪</p><p>No games available</p><p style="font-size:11px;margin-top:8px">Check that the backend is running and has published games.</p></div>';
      return;
    }
    let html = '<div class="store-list">';
    for (const g of games) {
      const gd = GRADIENTS[g.name.length % GRADIENTS.length];
      const tags = (g.tags || []).slice(0,3).map(t => `<span class="tag">${esc(t)}</span>`).join('');
      html += `
        <div class="store-item">
          <div class="store-icon" style="background:${gd}">${g.name.charAt(0).toUpperCase()}</div>
          <div class="store-info">
            <div class="store-name">${esc(g.name)}</div>
            <div class="store-meta">${esc(g.owner)} · ★ ${(g.rating||0).toFixed(1)} · ⬇ ${(g.downloads||0).toLocaleString()}</div>
            <div class="store-desc">${esc(g.description||'').substring(0,80)}${(g.description||'').length>80?'…':''}</div>
            <div class="store-tags">${tags}</div>
          </div>
          <div class="store-action">
            ${g.installed
              ? '<span class="installed-badge">✓ Installed</span>'
              : `<button class="btn btn-primary btn-sm" onclick="installGame('${esc(g.id)}','${esc(g.name)}')">Install</button>`
            }
          </div>
        </div>`;
    }
    html += '</div>';
    body.innerHTML = html;
  } catch(e) {
    body.innerHTML = `<div style="text-align:center;padding:40px;color:#ef4444"><p>Failed to load store</p><p style="font-size:11px;margin-top:8px">${esc(e.message||'')}</p></div>`;
  }
}

async function installGame(id, name) {
  const body = document.getElementById('panel-body');
  body.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim)"><p>⬇️ Installing...</p><p style="font-size:11px;margin-top:8px">Downloading and extracting ' + esc(name) + '</p></div>';
  try {
    const result = await api('POST', '/install', { id, name });
    if (result.success) {
      body.innerHTML = '<div style="text-align:center;padding:40px;color:#10b981"><p>✅ Installed!</p><p style="font-size:11px;margin-top:8px">' + esc(name) + ' is ready to play.</p><button class="btn btn-primary" style="margin-top:16px" onclick="loadStore();loadGames()">Back to Store</button></div>';
      loadGames(); // Refresh home screen
    } else {
      body.innerHTML = '<div style="text-align:center;padding:40px;color:#ef4444"><p>❌ Install failed</p><p style="font-size:11px;margin-top:8px">' + esc(result.error||'Unknown error') + '</p><button class="btn btn-secondary" style="margin-top:16px" onclick="loadStore()">Try Again</button></div>';
    }
  } catch(e) {
    body.innerHTML = '<div style="text-align:center;padding:40px;color:#ef4444"><p>❌ Install failed</p><p style="font-size:11px;margin-top:8px">' + esc(e.message||'') + '</p></div>';
  }
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ─── Settings UI ───
async function loadSettings() {
  try {
    const cfg = await api('GET', '/config');
    renderSettings(cfg);
  } catch(e) {
    document.getElementById('panel-body').innerHTML = `<p style="color:#ef4444;font-size:12px">Failed to load settings</p>`;
  }
}

function renderSettings(cfg) {
  const vol = (cfg.audio?.volume ?? 1) * 100;

  let html = '';
  // Shortcut customizer
  html += `<div class="setting-group">
    <div class="setting-label">Overlay Shortcut</div>
    <div class="shortcut-row" id="shortcut-row">
      <button class="shortcut-btn ${(cfg.overlay?.hotkey_modifiers||'').includes('ctrl')?'active':''}" onclick="toggleMod('ctrl')">Ctrl</button>
      <button class="shortcut-btn ${(cfg.overlay?.hotkey_modifiers||'').includes('shift')?'active':''}" onclick="toggleMod('shift')">Shift</button>
      <button class="shortcut-btn" onclick="pickKey()">${(cfg.overlay?.hotkey_key||'V').toUpperCase()}</button>
    </div>
  </div>`;

  // Webview toggle shortcut (always Ctrl+Shift+U)
  html += `<div class="setting-group">
    <div class="setting-label">Web UI Shortcut</div>
    <div class="setting-row"><label>Ctrl + Shift + U</label></div>
  </div>`;

  // Audio
  html += `<div class="setting-group">
    <div class="setting-label">Audio</div>
    <div class="setting-row">
      <label>Volume</label>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="range" min="0" max="100" value="${vol}" oninput="setVolume(this.value)">
        <span style="font-size:12px;width:32px;text-align:right">${Math.round(vol)}%</span>
      </div>
    </div>
  </div>`;

  // Startup behavior
  html += `<div class="setting-group">
    <div class="setting-label">Startup</div>
    <div class="setting-row">
      <label>Startup behavior</label>
      <select onchange="setStartup(this.value)">
        <option value="hidden" ${cfg.general?.startup_behavior==='hidden'?'selected':''}>Hidden</option>
        <option value="shown" ${cfg.general?.startup_behavior==='shown'?'selected':''}>Shown</option>
        <option value="minimised" ${(cfg.general?.startup_behavior||'').startsWith('min')?'selected':''}>Minimised</option>
      </select>
    </div>
  </div>`;

  // Overlay target window (EnumWindows)
  html += `<div class="setting-group">
    <div class="setting-label">Overlay Target</div>
    <div class="setting-row">
      <label>Follow window</label>
      <select id="window-select" onchange="setTargetWindow(this.value)">
        <option value="">None (free float)</option>
      </select>
    </div>
    <button class="btn btn-secondary" style="margin-top:8px" onclick="refreshWindows()">Refresh window list</button>
  </div>`;

  // Performance mode
  html += `<div class="setting-group">
    <div class="setting-label">Performance</div>
    <div class="setting-row">
      <label>Mode</label>
      <select onchange="setPerfMode(this.value)">
        <option value="battery" ${cfg.general?.performance_mode==='battery'?'selected':''}>Battery saver</option>
        <option value="balanced" ${(cfg.general?.performance_mode||'balanced')==='balanced'?'selected':''}>Balanced</option>
        <option value="performance" ${cfg.general?.performance_mode==='performance'?'selected':''}>Performance</option>
      </select>
    </div>
  </div>`;

  document.getElementById('panel-body').innerHTML = html;
  refreshWindowsList();
}

// ─── Settings IPC ───
async function toggleMod(mod) {
  const cfg = await api('GET', '/config');
  let mods = (cfg.overlay?.hotkey_modifiers || '').split(',').filter(Boolean);
  if (mods.includes(mod)) mods = mods.filter(m => m !== mod);
  else mods.push(mod);
  await api('PATCH', '/config', { overlay: { hotkey_modifiers: mods.join(',') } });
  loadSettings();
}

async function pickKey() {
  const key = prompt('Press a letter key (a-z):');
  if (key && key.match(/^[a-z]$/i)) {
    await api('PATCH', '/config', { overlay: { hotkey_key: key.toLowerCase() } });
    loadSettings();
  }
}

async function setVolume(v) {
  await api('PATCH', '/config', { audio: { volume: v / 100 } });
}

async function setStartup(v) {
  await api('PATCH', '/config', { general: { startup_behavior: v } });
}

async function setPerfMode(v) {
  await api('PATCH', '/config', { general: { performance_mode: v } });
}

async function setTargetWindow(hwnd) {
  await api('POST', '/set-overlay-target', { hwnd });
}

// ─── Window list (EnumWindows) ───
async function refreshWindows() {
  const sel = document.getElementById('window-select');
  sel.innerHTML = '<option>Scanning...</option>';
  await refreshWindowsList();
}

async function refreshWindowsList() {
  try {
    const data = await api('GET', '/list-windows');
    const sel = document.getElementById('window-select');
    if (!sel) return;
    const current = await api('GET', '/config');
    const targetHwnd = String(current.overlay?.target_hwnd || '');
    sel.innerHTML = '<option value="">None (free float)</option>';
    for (const w of data.windows || []) {
      const opt = document.createElement('option');
      opt.value = w.hwnd;
      opt.textContent = w.title || `Window #${w.hwnd}`;
      if (String(w.hwnd) === targetHwnd) opt.selected = true;
      sel.appendChild(opt);
    }
  } catch(e) {
    // silently fail — EnumWindows may not be available
  }
}

async function apiAbout() {
  try {
    const data = await api('GET', '/about');
    document.getElementById('modal-card').innerHTML = `
      <h2>VibeGE Runtime</h2>
      <div class="sub">${data.version || 'dev'}</div>
      <p>AI-friendly game overlay. Press <strong>Ctrl+Shift+U</strong> to toggle this UI.</p>
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="closeModal()">Close</button>
      </div>`;
    document.getElementById('modal').classList.add('open');
  } catch(e) {
    // fallback
  }
}

loadGames();
